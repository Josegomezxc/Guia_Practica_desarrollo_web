<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario de Registro</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <div class="card">

      <header class="card-header">
        <h1>Crear cuenta</h1>
        <p class="subtitle">Completa los campos para registrarte</p>
      </header>

      <form id="registerForm" novalidate>

        <div class="field">
          <label for="nombre">Nombre completo</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Ej. Jose Gomez"
            autocomplete="name"
          />
          <span class="error-msg" id="errorNombre"></span>
        </div>

        <div class="field">
          <label for="correo">Correo electrónico</label>
          <input
            type="email"
            id="correo"
            name="correo"
            placeholder="tu@correo.com"
            autocomplete="email"
          />
          <span class="error-msg" id="errorCorreo"></span>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
          />
          <span class="error-msg" id="errorPassword"></span>
        </div>

        <button type="submit" class="btn-submit">Registrarme</button>

      </form>

      <p class="footer-text">¿Ya tienes cuenta? <a href="#">Inicia sesión</a></p>

    </div>
  </div>

  
  <script src="scripts.js"></script>

</body>
</html>
